  <!-- ═══════════════════════════════════════════════════════
       STEP 4 — Cross-field validation in the template
       Explain: No custom validator class needed!
       We compare two component properties directly in the template.
       This is a key advantage for simple cases.
       ═══════════════════════════════════════════════════════ -->

      <span class="error" role="alert">Please confirm your password.</span>
    }

  <!-- ═══════════════════════════════════════════════════════
       STEP 5 — What happens without a "name" attribute?
       Explain: ngModel MUST have a name attribute to register
       with the parent form. Without it (using standalone mode),
       the control works for binding but is invisible to the form.
       Show form.value — this field won't appear.
       ═══════════════════════════════════════════════════════ -->
