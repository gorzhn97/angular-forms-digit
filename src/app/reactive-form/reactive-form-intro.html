<!-- ═══════════════════════════════════════════════════════════════
     STEP 1 — FormControl
     What to say:
       "A FormControl is a TypeScript object — not a directive.
        It tracks the current value, whether it's been touched,
        whether it's dirty, and whether it's valid.
        In the template we bind to it with [formControl]."
     What audience sees:
       Type in the input → the value updates live below it.
     ════════════════════════════════════════════════════════════════ -->

        validity across all of them at once."

       Both inputs update simpleGroup.value together.

<!-- ═══════════════════════════════════════════════════════════════
     STEP 3 — Built-in validators
     What to say:
       "Validators are just functions. Validators.required returns
        an error object when the value is empty; null when it's fine.
        We pass them as the second argument to FormControl.
        The FormGroup becomes invalid as soon as any control inside
        it is invalid."
     What audience sees:
       Leave fields empty or enter a bad email → error messages
       appear; group.valid flips to false.
     ════════════════════════════════════════════════════════════════ -->
